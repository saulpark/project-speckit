{% extends "base.html" %}

{% block title %}New Note{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <h2 class="mb-4"><i class="bi bi-plus-lg"></i> Create New Note</h2>
        <div class="card shadow-sm">
            <div class="card-body">
                <form method="POST" action="{{ url_for('notes.create_note') }}">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                    <div class="mb-3">
                        <label for="title" class="form-label">Title (optional)</label>
                        <input type="text" id="title" name="title" class="form-control" placeholder="Give your note a title...">
                    </div>
                    <div class="mb-3">
                        <label for="content" class="form-label">Content</label>
                        <textarea id="content" name="content" rows="10" class="form-control" required placeholder="Write your note here..."></textarea>
                    </div>
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary"><i class="bi bi-check-lg"></i> Create Note</button>
                        <a href="{{ url_for('notes.list_notes') }}" class="btn btn-outline-secondary">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
