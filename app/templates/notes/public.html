{% extends "base.html" %}

{% block title %}{{ note.title or 'Shared Note' }}{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card shadow-sm">
            <div class="card-header">
                <h4 class="mb-0">{{ note.title or 'Untitled' }}</h4>
            </div>
            <div class="card-body">
                <div class="text-muted small mb-3">
                    <i class="bi bi-calendar"></i> Created: {{ note.created_at.strftime('%Y-%m-%d %H:%M') }}
                    &middot;
                    <span class="badge bg-info">Read-only shared note</span>
                </div>
                <div class="border rounded p-3 bg-light">
                    <pre class="mb-0" style="white-space: pre-wrap;">{{ content }}</pre>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
