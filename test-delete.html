<!DOCTYPE html>
<html>
<head>
    <title>DELETE Test</title>
</head>
<body>
    <h1>DELETE Request Test</h1>
    <button onclick="testDelete()">Test DELETE (Browser)</button>
    <div id="result"></div>

    <script>
    async function testDelete() {
        console.log('Starting browser DELETE test...');
        const result = document.getElementById('result');

        try {
            // Create a test note first
            const createResponse = await fetch('http://localhost:3000/notes', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Accept': 'application/json'
                },
                credentials: 'include',
                body: JSON.stringify({
                    title: 'Browser DELETE Test Note',
                    content: {
                        data: {
                            ops: [{ insert: 'This note will test browser DELETE\n' }]
                        }
                    }
                })
            });

            const createData = await createResponse.json();
            console.log('Note created:', createData);

            if (createData.success) {
                const noteId = createData.data.note._id;
                result.innerHTML = `<p>Note created with ID: ${noteId}</p>`;

                // Now test DELETE
                console.log('Testing DELETE request...');
                const deleteResponse = await fetch(`http://localhost:3000/notes/${noteId}`, {
                    method: 'DELETE',
                    headers: {
                        'Accept': 'application/json'
                    },
                    credentials: 'include'
                });

                console.log('DELETE response status:', deleteResponse.status);
                const deleteData = await deleteResponse.text();
                console.log('DELETE response body:', deleteData);

                result.innerHTML += `<p>DELETE Status: ${deleteResponse.status}</p>`;
                result.innerHTML += `<p>DELETE Response: ${deleteData}</p>`;
            } else {
                result.innerHTML = `<p>Failed to create note: ${createData.message}</p>`;
            }

        } catch (error) {
            console.error('Test failed:', error);
            result.innerHTML = `<p>Error: ${error.message}</p>`;
        }
    }
    </script>
</body>
</html>
